name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-exe:
    name: Build Windows executable
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "26.x"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate
        run: |
          npm run typecheck
          npm test
          npm run build
          npm audit

      - name: Build executable folder
        run: npm run package:win

      - name: Create zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive -Path release/ark-asa-mcp-win-x64/* -DestinationPath release/ark-asa-mcp-win-x64.zip -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ark-asa-mcp-win-x64
          path: release/ark-asa-mcp-win-x64.zip

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --draft --title $tag --notes "Windows executable release for ark-asa-mcp."
          }
          gh release upload $tag release/ark-asa-mcp-win-x64.zip --clobber
